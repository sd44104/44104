<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-4 종합 현황판</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root { --theme-color: #3182F6; --bg-color: #F2F4F6; --text-color: #191F28; --panel-bg: #FFFFFF; --border-color: #E5E8EB; --glass-bg: rgba(255, 255, 255, 0.9); }
body[data-theme="dark"] { --theme-color: #0A84FF; --bg-color: #0D0D0E; --text-color: #fff; --panel-bg: rgba(255,255,255,0.03); --border-color: rgba(255,255,255,0.1); --glass-bg: rgba(22, 22, 24, 0.85); }

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
body { background: var(--bg-color); color: var(--text-color); overflow: hidden; height: 100vh; display: flex; flex-direction: column; transition: background 0.3s, color 0.3s; -webkit-font-smoothing: antialiased; }

/* Top Bar */
.top-bar { display: flex; justify-content: space-between; align-items: center; padding: 30px 50px; background: var(--panel-bg); flex-shrink: 0; border-bottom: 1px solid var(--border-color); }
.clock { font-size: 50px; font-weight: 800; cursor: pointer; user-select: none; transition: 0.2s; }
.clock:hover { transform: scale(1.05); color: var(--theme-color); }
.status-txt { font-size: 45px; color: var(--theme-color); font-weight: 800; margin-top: 0; }

.global-notice-bar { background: rgba(49, 130, 246, 0.1); border-bottom: 1px solid rgba(49, 130, 246, 0.2); padding: 15px 50px; display: none; align-items: center; gap: 30px; font-size: 32px; font-weight: 800; flex-shrink: 0; color: var(--text-color); }
.global-notice-badge { background: var(--theme-color); color: #fff; padding: 10px 25px; border-radius: 12px; font-size: 28px; font-weight: 900; white-space: nowrap; }

/* Active Board - 스크롤 원천 차단 (overflow: hidden) */
#active-board { flex: 1; display: none; padding: 40px 80px; overflow: hidden; gap: 60px; align-items: stretch; }
.main-title { font-size: 60px; font-weight: 900; text-align: left; margin-bottom: 50px; }
.info-row { display: flex; align-items: flex-start; font-size: 45px; font-weight: 800; margin-bottom: 40px; }
.info-label { width: 300px; color: #8B95A1; flex-shrink: 0; }
.info-value { color: var(--theme-color); font-size: 55px; font-weight: 900; }
.spec-container { flex: 1; font-size: 40px; font-weight: 700; line-height: 1.6; display: flex; flex-wrap: wrap; gap: 15px; }
.spec-names { color: #34C759; }
.spec-names.absent { color: #F04452; }

/* 실시간 열공 캠 보드 */
#side-rank-board { flex: 1; background: var(--panel-bg); border-radius: 30px; padding: 40px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid var(--border-color); overflow: hidden; }
.side-box-title { display: flex; justify-content: space-between; align-items: center; font-size: 36px; font-weight: 900; color: var(--theme-color); border-bottom: 2px solid var(--border-color); padding-bottom: 15px; flex-shrink: 0; }
.cam-count-badge { background: var(--theme-color); color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 24px; font-weight: bold; }
#cam-mosaic-grid { flex: 1; overflow: hidden; display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; align-content: start; padding-right: 15px; padding-top: 10px; }
.cam-box { position: relative; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 4/3; border: 2px solid var(--border-color); box-shadow: 0 5px 15px rgba(0,0,0,0.1); animation: popIn 0.3s ease; }
.cam-box video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
.cam-label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 16px; padding: 4px 10px; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); }

@keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* Idle Screen */
#idle-screen { display: none; flex: 1; padding: 50px; display: flex; gap: 40px; align-items: stretch; overflow: hidden; }

/* Overlays */
#break-overlay, #end-overlay, #black-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
#break-overlay, #end-overlay { background: rgba(255, 255, 255, 0.95); }
body[data-theme="dark"] #break-overlay, body[data-theme="dark"] #end-overlay { background: rgba(10, 10, 12, 0.98); }
#black-overlay { background: #000; z-index: 6000; }
.massive-text { font-size: 90px; font-weight: 900; color: var(--text-color); margin-bottom: 20px; }
.massive-timer { font-size: 180px; font-weight: 900; color: var(--theme-color); font-variant-numeric: tabular-nums; }

/* Ticker */
.bottom-ticker { background: var(--panel-bg); height: 100px; flex-shrink: 0; display: flex; align-items: center; overflow: hidden; position: relative; border-top: 1px solid var(--border-color); }
.ticker-title { background: var(--theme-color); color: #fff; font-weight: 900; padding: 0 40px; height: 100%; display: flex; align-items: center; font-size: 28px; z-index: 10; white-space: nowrap; }
.ticker-wrap { flex: 1; height: 100%; overflow: hidden; display: flex; align-items: center; }
.ticker-move { height: 100%; display: flex; align-items: center; white-space: nowrap; gap: 80px; padding-left: 100%; animation: ticker 25s linear infinite; }
.ticker-item { font-size: 32px; font-weight: bold; display: flex; align-items: center; }
.ticker-item span { color: var(--theme-color); margin-right: 10px; }
@keyframes ticker { 0% { transform: translate3d(0, 0, 0); } 100% { transform: translate3d(-100%, 0, 0); } }

/* Popups & Tools */
#notice-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 255, 255, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; padding: 60px; text-align: center; }
body[data-theme="dark"] #notice-overlay { background: rgba(0, 0, 0, 0.95); }
.popup-badge { background: #BF5AF2; color: #fff; padding: 20px 50px; font-size: 40px; font-weight: 900; border-radius: 60px; margin-bottom: 50px; }
.popup-content { font-size: 72px; font-weight: 900; color: var(--text-color); line-height: 1.5; }

#song-popup-ui { display: none; position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: var(--panel-bg); border: 3px solid var(--theme-color); padding: 30px 60px; border-radius: 30px; z-index: 9999; box-shadow: 0 15px 40px rgba(0,0,0,0.2); flex-direction: column; align-items: center; gap: 10px; text-align: center; }
.song-popup-title { font-size: 50px; font-weight: 900; color: var(--text-color); }
.song-popup-artist { font-size: 30px; font-weight: 700; color: #8B95A1; }
</style>
</head>
<body data-theme="light">

<div id="break-overlay"><div class="massive-text" id="break-title">쉬는 시간입니다!</div><div class="massive-timer" id="break-timer-text">00:00</div></div>
<div id="end-overlay"><div class="massive-text" style="font-size: 70px; line-height:1.5;">오늘 일과가 종료되었습니다.<br>조심해서 들어가세요🥹</div></div>
<div id="black-overlay"></div>

<div class="top-bar">
  <div class="clock" id="live-clock">오전 00:00:00</div>
  <div class="status-txt" id="timer-status-bar">따뜻한 마음과 성실한 걸음으로</div>
</div>

<div id="global-notice-bar" class="global-notice-bar">
  <div class="global-notice-badge">공지사항</div>
  <marquee id="global-notice-marquee" scrollamount="15" style="flex:1;"></marquee>
</div>

<div id="active-board">
  <div style="flex: 1.5; display: flex; flex-direction: column;">
    <div class="main-title" id="main-date-title">학급 현황판</div>
    <div class="info-row"><div class="info-label">전체인원</div><div class="info-value" id="val-total-count">26명</div></div>
    <div class="info-row"><div class="info-label">현재인원</div><div class="info-value" id="val-current-count">26명</div></div>
    <div class="info-row" style="flex:1; overflow:hidden;">
        <div class="info-label">특이사항</div>
        <div class="spec-container" id="val-spec-list"></div>
    </div>
  </div>
  
  <div id="side-rank-board">
    <div class="side-box-title">
        <span>🎥 실시간 열공 캠</span>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button id="toggle-cam-view-btn" onclick="toggleCamView()" style="background:none; border:none; color:var(--text-color); font-size:24px; cursor:pointer; transition: 0.2s;">
                <i class="fa-solid fa-eye"></i>
            </button>
            <span class="cam-count-badge" id="cam-active-count">0명</span>
        </div>
    </div>
    <div id="cam-mosaic-grid"></div>
  </div>
</div>

<div id="idle-screen"></div>

<div class="bottom-ticker">
  <div class="ticker-title">실시간 한마디</div>
  <div class="ticker-wrap"><div class="ticker-move" id="ticker-container"></div></div>
</div>

<div id="notice-overlay">
  <div class="popup-badge" id="popup-badge-ui">전광판 공지</div>
  <div class="popup-content" id="popup-notice-text">불러오는 중...</div>
</div>

<script>
var firebaseConfig = { apiKey: "AlzaSyBsYbl11XCtPyUkby8GzEJHlxw_T28WNrg", authDomain: "class4-board-f6054.firebaseapp.com", databaseURL: "https://class4-board-f6054-default-rtdb.firebaseio.com/", projectId: "class4-board-f6054" };
firebase.initializeApp(firebaseConfig); var db = firebase.database();

let forceBlackScreen = false;
db.ref('config/blackScreen').on('value', snap => { forceBlackScreen = snap.val() === true; });

// 시간표 및 시계 로직 
setInterval(() => {
  const now = new Date();
  document.getElementById('main-date-title').innerText = `[${now.toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'long'})}] 학급 현황판`;
  let hrs = now.getHours(); const mins = String(now.getMinutes()).padStart(2, '0'); const secs = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('live-clock').innerText = `${hrs >= 12 ? '오후' : '오전'} ${hrs%12||12}:${mins}:${secs}`;
}, 1000);

// 캠스터디 화면 토글
let isCamVisible = true;
function toggleCamView() {
    isCamVisible = !isCamVisible;
    const grid = document.getElementById('cam-mosaic-grid');
    const btn = document.getElementById('toggle-cam-view-btn');
    grid.style.display = isCamVisible ? 'grid' : 'none';
    btn.innerHTML = isCamVisible ? '<i class="fa-solid fa-eye"></i>' : '<i class="fa-solid fa-eye-slash"></i>';
    btn.style.color = isCamVisible ? 'var(--text-color)' : '#8B95A1';
}

// 출결 데이터 및 특이사항 (스크롤 방지 가로배열 렌더링)
const adv = ["강필정", "계시우", "김진영", "남궁승후", "서지호", "송예성", "송지율", "이규진"];
db.ref().on('value', snap => {
  const data = snap.val() || {}; const conf = data.config || {};
  
  if (conf.boardActive !== false) {
    document.getElementById('active-board').style.display = 'flex';
    let net = 0, g = {};
    for (let k in (data.studentStates||{})) {
      let s = data.studentStates[k]; let n = k.split(' ')[1];
      if (adv.includes(n)) { if (s.includes("교실자습") || s === "심화반") net++; } 
      else { if (s !== "출석" && s !== "정상") net--; }
      if (!g[s]) g[s] = []; g[s].push(n);
    }
    document.getElementById('val-total-count').innerText = `26명`; document.getElementById('val-current-count').innerText = `${26 + net}명`;
    
    // 특이사항 렌더링 (가로 자동 줄바꿈)
    const sc = document.getElementById('val-spec-list'); 
    let specHTML = ``; let hs = false;
    Object.keys(g).forEach(s => {
      if(s !== "출석" && s !== "심화반 이동자습" && s !== "정상") { 
          hs = true; 
          specHTML += `<div style="background: var(--bg-color); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--border-color);"><span style="color:var(--text-color); font-weight:bold;">${s} (${g[s].length}):</span> <span class="spec-names ${['결석','조퇴'].includes(s)?'absent':''}">${g[s].join(", ")}</span></div>`; 
      }
    });
    sc.innerHTML = hs ? specHTML : '<div style="color:#8B95A1;">특이사항 없음</div>';
  }
});

// 티커
db.ref('messages').limitToLast(15).on('value', snap => {
  const c = document.getElementById('ticker-container'); c.innerHTML = "";
  snap.forEach(ch => { const m = ch.val(); c.innerHTML += `<div class="ticker-item"><span>[${m.nickname||'익명'}]</span>${m.message}</div>`; });
});

// ============== WebRTC 완벽 연동 엔진 (대시보드 핑 패치) ==============
const peer = new Peer('CLASS104_ELECTRONIC_BLACKBOARD_2026'); // 구글망 제외, 가장 안정적인 기본망 사용
let currentStreams = {};

peer.on('open', (id) => {
    console.log('대시보드 전광판 인프라 개통 완료 ID:', id);
    // 대시보드가 새로고침 되었음을 학생들에게 알려 강제로 화면을 다시 쏘게 만듦
    db.ref('camStudy/dashboardPing').set(Date.now()); 
});

peer.on('call', (call) => {
    call.answer();
    call.on('stream', (remoteStream) => {
        const boxId = 'cam-box-' + call.peer;
        
        if (!document.getElementById(boxId)) {
            const container = document.createElement('div');
            container.className = 'cam-box';
            container.id = boxId;
            
            const video = document.createElement('video');
            video.srcObject = remoteStream;
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;

            const name = (call.metadata && call.metadata.userName) ? call.metadata.userName : "열공학생";
            const label = document.createElement('div');
            label.className = 'cam-label';
            label.innerHTML = `<i class="fa-solid fa-circle" style="color:#34C759; font-size:10px;"></i> ${name}`;

            container.appendChild(video);
            container.appendChild(label);
            
            const grid = document.getElementById('cam-mosaic-grid');
            grid.insertBefore(container, grid.firstChild);
            
            currentStreams[call.peer] = call;
            updateCamCount();
        }
    });
});

// 캠 종료한 학생 화면 자동 삭제
db.ref('camStudy/activePeers').on('value', snap => {
    const activePeers = [];
    snap.forEach(child => { activePeers.push(child.val().peerId); });
    
    Object.keys(currentStreams).forEach(peerId => {
        if (!activePeers.includes(peerId)) {
            const box = document.getElementById('cam-box-' + peerId);
            if (box) box.remove();
            if (currentStreams[peerId]) currentStreams[peerId].close();
            delete currentStreams[peerId];
        }
    });
    updateCamCount();
});

function updateCamCount() {
    const count = Object.keys(currentStreams).length;
    document.getElementById('cam-active-count').innerText = `${count}명`;
}
</script>
</body>
</html>
