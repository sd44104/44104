<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>104 통합 로그인</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
body { background: #F8FAFC; height: 100vh; display: flex; justify-content: center; align-items: center; position: relative; }
.login-container { background: #FFFFFF; padding: 50px 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; border: 1px solid #E2E8F0; }
.title { font-size: 28px; font-weight: 800; color: #1E293B; margin-bottom: 30px; letter-spacing: -0.5px; }
.input-group { margin-bottom: 15px; }
.login-input { width: 100%; padding: 16px; background: #F1F5F9; border: 1px solid #CBD5E1; border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s; color: #1E293B; }
.login-input:focus { border-color: #2563EB; background: #FFF; box-shadow: 0 0 0 4px rgba(37,99,235,0.1); }
.btn-login { width: 100%; padding: 16px; background: #2563EB; color: #FFF; font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; margin-bottom: 15px; }
.btn-login:hover { background: #1D4ED8; }
.admin-link { color: #64748B; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: underline; background: none; border: none; }
.admin-link:hover { color: #2563EB; }
.footer-logo { margin-top: 40px; font-size: 14px; font-weight: 600; color: #94A3B8; }
.footer-logo span { color: #2563EB; font-weight: 800; }
.dashboard-btn { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #FFF; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; color: #1E293B; box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; border: 1px solid #E2E8F0; transition: 0.2s; }
.dashboard-btn:hover { transform: translateY(-5px); color: #2563EB; }

/* Admin Login Modal */
#admin-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index: 100; backdrop-filter: blur(5px); }
.admin-modal-content { background: #1E293B; padding: 40px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
.admin-modal-content h3 { color: #FFF; margin-bottom: 20px; }
.admin-input { background: #334155; border: 1px solid #475569; color: #FFF; }
.admin-btn { background: #38BDF8; color: #0F172A; }
</style>
</head>
<body>

<div class="login-container">
  <div class="title">104 통합 로그인</div>
  
  <div class="input-group">
    <input type="text" id="student-name" class="login-input" placeholder="이름 (예: 강필정)">
  </div>
  <div class="input-group">
    <input type="password" id="student-pw" class="login-input" placeholder="비밀번호" onkeydown="if(event.keyCode==13) loginStudent()">
  </div>
  <button class="btn-login" onclick="loginStudent()">학생 로그인</button>
  
  <button class="admin-link" onclick="document.getElementById('admin-modal').style.display='flex'">관리자 로그인 ➔</button>
  
  <div class="footer-logo">Powered by <span>SIRYANG</span></div>
</div>

<div class="dashboard-btn" onclick="location.href='dashboard.html'" title="대시보드 진입">
  <i class="fa-solid fa-display"></i>
</div>

<div id="admin-modal" onclick="if(event.target==this) this.style.display='none'">
  <div class="admin-modal-content">
    <h3><i class="fa-solid fa-server" style="color:#38BDF8;"></i> ERP 관리자 접속</h3>
    <input type="text" id="admin-id" class="login-input admin-input" style="margin-bottom:10px;" placeholder="관리자 ID (이름)">
    <input type="password" id="admin-pw" class="login-input admin-input" style="margin-bottom:20px;" placeholder="보안 비밀번호" onkeydown="if(event.keyCode==13) loginAdmin()">
    <button class="btn-login admin-btn" onclick="loginAdmin()">보안 접속 승인</button>
  </div>
</div>

<script>
// Firebase 설정 (기존과 동일)
var firebaseConfig = { apiKey: "AlzaSyBsYbl11XCtPyUkby8GzEJHlxw_T28WNrg", authDomain: "class4-board-f6054.firebaseapp.com", databaseURL: "https://class4-board-f6054-default-rtdb.firebaseio.com/", projectId: "class4-board-f6054" };
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 학생 데이터 (student.html에서 가져옴)
const fullRosterRaw = [
  { num: "01", name: "강필정" }, { num: "02", name: "계시우" }, { num: "03", name: "김도현" }, { num: "04", name: "김민성" }, { num: "05", name: "김범준" }, { num: "06", name: "김시량" }, { num: "07", name: "김예담" }, { num: "08", name: "김우식" }, { num: "09", name: "김재준" }, { num: "10", name: "김재훈" }, { num: "11", name: "김정모" }, { num: "12", name: "김진규" }, { num: "13", name: "김진영" }, { num: "14", name: "김태린" }, { num: "15", name: "김태림" }, { num: "16", name: "김태환" }, { num: "17", name: "남궁승후" }, { num: "18", name: "박시우" }, { num: "19", name: "백동하" }, { num: "20", name: "서재원" }, { num: "21", name: "서지호" }, { num: "22", name: "송예성" }, { num: "23", name: "송지율" }, { num: "24", name: "오승현" }, { num: "25", name: "윤중근" }, { num: "26", name: "이건우" }, { num: "27", name: "이규진" }, { num: "28", name: "이명석" }, { num: "29", name: "이승우" }, { num: "30", name: "이유찬" }, { num: "31", name: "이태성" }, { num: "32", name: "장지후" }, { num: "33", name: "전서호" }, { num: "34", name: "정한준" }
];
const studentRoster = {};
fullRosterRaw.forEach(student => { studentRoster[student.name] = "104" + student.num; });

window.onload = function() {
  if (localStorage.getItem('savedStudentName')) location.href = 'student.html';
  if (localStorage.getItem('adminUser')) location.href = 'admin.html';
}

function loginStudent() {
  const inputName = document.getElementById('student-name').value.replace(/\s/g, "");
  const inputPw = document.getElementById('student-pw').value.replace(/\s/g, "");
  if (!inputName) { alert("이름을 입력해주세요!"); return; }

  db.ref('auth/students/' + inputName).once('value').then(snap => {
    const customPw = snap.val();
    const validPw = customPw ? customPw : studentRoster[inputName];
    if (studentRoster[inputName] && validPw === inputPw) {
      localStorage.setItem('savedStudentName', inputName);
      location.href = 'student.html';
    } else { alert("정보가 일치하지 않습니다."); }
  });
}

function loginAdmin() {
  var id = document.getElementById('admin-id').value.trim();
  var pw = document.getElementById('admin-pw').value.trim();

  if (pw === "peng0114+") {
    localStorage.setItem('adminUser', id || "마스터관리자"); 
    localStorage.setItem('isMasterAdmin', 'true'); 
    location.href = 'admin.html'; return;
  }

  db.ref('auth/admins').once('value').then(snap => {
    let validAdmins = [];
    if(snap.exists()) { snap.forEach(child => { if (child.val() === true) validAdmins.push(child.key); else validAdmins.push(child.val()); }); } 
    else { validAdmins = ["김재훈", "김시량", "장지후", "전서호", "박예성", "담임선생님"]; }
    db.ref('auth/adminPw').once('value').then(pwSnap => {
      const realPw = pwSnap.val() || "104000"; 
      if (validAdmins.includes(id) && pw === realPw) {
        db.ref('forceLogout/' + id).remove(); 
        localStorage.setItem('adminUser', id);
        location.href = 'admin.html';
      } else { alert("인증 정보가 일치하지 않거나 권한이 없습니다."); }
    });
  });
}
</script>
</body>
</html>
