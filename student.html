<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root {
  --primary: #0A84FF; --bg-color: #f8f9fa; --box-bg: #ffffff;
  --text-main: #111; --text-sub: #666; --border: #e2e8f0;
  --nav-bg: #e0e7ff; --nav-text: #3730a3;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
/* 스케치 느낌의 도트 배경 */
body::before {
  content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
  background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px;
}

/* ---------------- Top Navigation ---------------- */
.top-nav {
  display: none; align-items: center; justify-content: space-between; padding: 15px 30px; 
  background: var(--box-bg); border-bottom: 2px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02);
}
.nav-logo { font-size: 22px; font-weight: 900; color: var(--primary); display: flex; flex-direction: column; line-height: 1.1; }
.nav-logo span { font-size: 12px; color: #111; }
.nav-menu { display: flex; gap: 10px; align-items: center; }
.nav-item {
  padding: 10px 18px; border-radius: 20px; font-weight: 700; font-size: 15px; color: var(--text-main);
  cursor: pointer; transition: 0.2s; border: none; background: transparent;
}
.nav-item:hover { background: #f1f5f9; }
.nav-item.active { background: var(--nav-bg); color: var(--nav-text); }
.nav-admin-btn { border: 2px solid #cbd5e1; padding: 8px 15px; border-radius: 8px; color: #64748B; font-weight: bold; cursor: pointer; background: #fff; margin-left: 20px; }

/* ---------------- Main Container & Views ---------------- */
.main-content { flex: 1; overflow-y: auto; padding: 30px; display: flex; justify-content: center; }
.view-section { display: none; width: 100%; max-width: 1200px; animation: fadeIn 0.3s ease; }
.view-section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* View: Login (IMG_1668) */
.login-box {
  background: var(--box-bg); padding: 50px; border-radius: 20px; border: 2px solid var(--border);
  box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; max-width: 400px; margin: 10vh auto;
}
.login-input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 2px solid var(--border); font-size: 16px; outline: none; }
.login-input:focus { border-color: var(--primary); }
.btn-primary { width: 100%; padding: 16px; background: var(--primary); color: #fff; font-weight: 800; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; }

/* View: Home (IMG_1667) */
.notice-banner { background: #fff3cd; border: 1px solid #ffe69c; color: #664d03; padding: 15px 20px; border-radius: 12px; font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; cursor: pointer;}
.home-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
.panel { background: var(--box-bg); border: 2px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.03); }
.status-big-box { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 300px;}
.status-val { font-size: 60px; font-weight: 900; margin: 20px 0; color: var(--primary); }
.status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin-top: 20px;}
.status-btn { padding: 15px; border-radius: 12px; border: 2px solid var(--border); background: #f8fafc; font-weight: bold; cursor: pointer; transition: 0.2s;}
.status-btn:hover { border-color: var(--primary); background: #eff6ff; }
.profile-info { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
.util-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.util-btn { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; border-radius: 16px; border: 2px solid var(--border); background: #fff; font-weight: bold; cursor: pointer; transition: 0.2s;}
.util-btn i { font-size: 24px; color: var(--primary); }
.util-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }

/* View: Timetable & Meals (IMG_1672) */
.time-meal-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
.timetable-table { width: 100%; border-collapse: collapse; text-align: center; }
.timetable-table th, .timetable-table td { border: 2px solid var(--border); padding: 15px 10px; font-weight: bold; }
.timetable-table th { background: #f1f5f9; }
.timetable-table td.today { background: #e0e7ff; color: #3730a3; border-color: #a5b4fc;}
.current-class-box { border: 3px solid var(--text-main); border-radius: 16px; padding: 25px; text-align: center; margin-bottom: 20px; font-weight: 900; }
.meal-box { border: 2px solid var(--border); border-radius: 16px; padding: 20px; height: 100%; }
.meal-box h4 { border-bottom: 2px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; font-size: 18px; }

/* View: Chat (IMG_1669) */
.chat-container { display: flex; flex-direction: column; height: calc(100vh - 150px); border: 2px solid var(--border); border-radius: 20px; background: #fff; overflow: hidden;}
.chat-logs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 15px; background: #f8fafc;}
.chat-bubble { max-width: 70%; padding: 12px 18px; border-radius: 16px; background: #e2e8f0; align-self: flex-start; font-weight: 500;}
.chat-bubble.admin { background: #dbeafe; border-left: 4px solid var(--primary); }
.chat-input-area { display: flex; padding: 20px; background: #fff; border-top: 2px solid var(--border); gap: 10px;}
.chat-input { flex: 1; padding: 15px; border-radius: 12px; border: 2px solid var(--border); font-size: 16px; outline: none; }

/* View: Games (IMG_1671) */
.game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; height: 60vh; }
.game-card { border: 3px solid var(--text-main); border-radius: 24px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 28px; font-weight: 900; cursor: pointer; transition: 0.3s; background: #fff; text-decoration: none; color: inherit;}
.game-card i { font-size: 80px; margin-bottom: 20px; }
.game-card:hover { transform: scale(1.03); box-shadow: 10px 10px 0 #111; }

/* View: Notices (IMG_1670) */
.notice-layout { display: flex; flex-direction: column; gap: 20px; }
.dday-card { border: 2px solid var(--border); border-radius: 16px; padding: 25px; display: flex; justify-content: space-between; align-items: center; background: #fff; font-size: 24px; font-weight: 900;}
.dday-badge { background: var(--text-main); color: #fff; padding: 10px 20px; border-radius: 12px; font-size: 32px; }

/* Modals */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal-content { background: #fff; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }

/* Game View Overlay */
#game-iframe-container { display: none; position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: #111; z-index: 2000; flex-direction: column; }
.game-top-bar { padding: 15px 30px; background: #222; display: flex; justify-content: space-between; align-items: center; color: #fff;}
.btn-exit-game { background: #ef4444; color: #fff; padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer;}
</style>
</head>

<script>
/* =========================================================
   1. Firebase 초기화 및 전역 변수
========================================================= */
const firebaseConfig = { apiKey: "AlzaSyBsYbl11XCtPyUkby8GzEJHlxw_T28WNrg", authDomain: "class4-board-f6054.firebaseapp.com", databaseURL: "https://class4-board-f6054-default-rtdb.firebaseio.com/", projectId: "class4-board-f6054" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const fullRosterRaw = [
  { num: "01", name: "강필정" }, { num: "02", name: "계시우" }, { num: "03", name: "김도현" }, { num: "04", name: "김민성" }, { num: "05", name: "김범준" }, { num: "06", name: "김시량" }, { num: "07", name: "김예담" }, { num: "08", name: "김우식" }, { num: "09", name: "김재준" }, { num: "10", name: "김재훈" }, { num: "11", name: "김정모" }, { num: "12", name: "김진규" }, { num: "13", name: "김진영" }, { num: "14", name: "김태린" }, { num: "15", name: "김태림" }, { num: "16", name: "김태환" }, { num: "17", name: "남궁승후" }, { num: "18", name: "박시우" }, { num: "19", name: "백동하" }, { num: "20", name: "서재원" }, { num: "21", name: "서지호" }, { num: "22", name: "송예성" }, { num: "23", name: "송지율" }, { num: "24", name: "오승현" }, { num: "25", name: "윤중근" }, { num: "26", name: "이건우" }, { num: "27", name: "이규진" }, { num: "28", name: "이명석" }, { num: "29", name: "이승우" }, { num: "30", name: "이유찬" }, { num: "31", name: "이태성" }, { num: "32", name: "장지후" }, { num: "33", name: "전서호" }, { num: "34", name: "정한준" }
];
const studentMap = {};
fullRosterRaw.forEach(s => { studentMap[s.name] = { num: s.num, defaultPw: "104" + s.num, fullName: s.num + " " + s.name }; });

let loggedInUser = null;

/* =========================================================
   2. UI 및 인증 컨트롤
========================================================= */
window.onload = () => {
  const savedUser = localStorage.getItem('savedStudentName');
  if (savedUser && studentMap[savedUser]) {
    loggedInUser = savedUser;
    initApp();
  }
};

function doLogin() {
  const name = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  if (!name || !studentMap[name]) { alert("등록되지 않은 이름입니다."); return; }

  db.ref('auth/students/' + name).once('value').then(snap => {
    const customPw = snap.val();
    const validPw = customPw ? customPw : studentMap[name].defaultPw;
    if (pw === validPw) {
      localStorage.setItem('savedStudentName', name);
      loggedInUser = name;
      initApp();
    } else {
      alert("비밀번호가 일치하지 않습니다.");
    }
  });
}

function doLogout() {
  if(confirm("로그아웃 하시겠습니까?")) {
    localStorage.removeItem('savedStudentName');
    location.reload();
  }
}

function initApp() {
  document.getElementById('top-nav').style.display = 'flex';
  document.getElementById('user-name-display').innerText = loggedInUser;
  switchTab('home');
  
  // 리스너 등록
  trackStatus();
  trackChat();
  trackNotices();
  
  // 모바일학생증 바코드 세팅
  const studentNum = "104" + studentMap[loggedInUser].num;
  document.getElementById('id-name').innerText = loggedInUser;
  document.getElementById('id-number').innerText = studentNum;
  db.ref('studentBarcodes/' + loggedInUser).once('value').then(snap => {
    const code = snap.val() || (studentNum + "0000");
    JsBarcode("#barcode-canvas", code, { format: "CODE128", displayValue: true, width: 2, height: 50 });
  });

  // 나이스 API 호출 (시간표/급식)
  fetchNeisData();
}

function switchTab(tabId) {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  
  document.getElementById(`view-${tabId}`).classList.add('active');
  const navBtns = document.querySelectorAll('.nav-item');
  if(tabId === 'home') navBtns.forEach(btn=>btn.classList.remove('active'));
  else {
    Array.from(navBtns).find(btn => btn.innerText.includes(
      tabId==='timetable' ? '시간표' : tabId==='chat' ? '실시간' : tabId==='games' ? '게임' : '공지'
    ))?.classList.add('active');
  }
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

/* =========================================================
   3. 기능 로직 (출석, 채팅, 공지, 기타)
========================================================= */
function changeStatus(stat) {
  if (stat === '기타') {
    stat = prompt("사유를 입력하세요:");
    if (!stat) return;
  }
  const fullName = studentMap[loggedInUser].fullName;
  db.ref('studentStates/' + fullName).set(stat).then(() => alert("상태가 업데이트 되었습니다."));
}

function trackStatus() {
  const fullName = studentMap[loggedInUser].fullName;
  db.ref('studentStates/' + fullName).on('value', snap => {
    document.getElementById('my-current-status').innerText = snap.val() || "출석";
  });
  db.ref('currentSeats').on('value', snap => {
    const seats = snap.val() || {};
    let mySeat = "지정되지 않음";
    for(let pos in seats) { if(seats[pos] === loggedInUser) { mySeat = pos; break; } }
    document.getElementById('my-seat-info').innerText = `내 자리: ${mySeat}`;
  });
}

function sendChat() {
  const nick = document.getElementById('chat-nick').value.trim() || "익명";
  const msg = document.getElementById('chat-msg').value.trim();
  if(!msg) return;
  db.ref('messages').push({ realName: studentMap[loggedInUser].fullName, nickname: nick, message: msg, timestamp: Date.now() }).then(() => {
    document.getElementById('chat-msg').value = "";
  });
}

function trackChat() {
  db.ref('messages').limitToLast(30).on('value', snap => {
    const list = document.getElementById('chat-list');
    list.innerHTML = "";
    snap.forEach(child => {
      const d = child.val();
      const div = document.createElement('div');
      div.className = "chat-bubble" + (d.badge || d.realName === "시스템 관리자" ? " admin" : "");
      div.innerHTML = `<div style="font-size:12px; color:#888; font-weight:bold; margin-bottom:4px;">${d.nickname}</div>${d.message}`;
      list.appendChild(div);
    });
  });
}

function trackNotices() {
  // 상단 띠배너 공지
  db.ref('config/studentNotice').on('value', snap => {
    const txt = snap.val();
    if(txt) { document.getElementById('top-banner').style.display = 'flex'; document.getElementById('banner-text').innerText = txt; }
    else document.getElementById('top-banner').style.display = 'none';
  });
  
  // 공지 목록 및 디데이
  db.ref('classNotices').limitToLast(10).on('value', snap => {
    const list = document.getElementById('full-notice-list');
    list.innerHTML = "";
    let arr = []; snap.forEach(c => arr.push(c.val()));
    arr.reverse().forEach(d => {
      list.innerHTML += `<div style="padding:15px; border:2px solid var(--border); border-radius:12px;"><div style="font-size:12px; color:var(--primary); font-weight:bold;">${d.author}</div>${d.text}</div>`;
    });
  });
  db.ref('dDays').on('value', snap => {
    const list = document.getElementById('dday-container');
    list.innerHTML = "";
    snap.forEach(c => {
      const d = c.val();
      list.innerHTML += `<div class="dday-card"><span>${d.title}</span><span class="dday-badge">${d.date}</span></div>`;
    });
  });
}

function submitSong() {
  const t = document.getElementById('song-title').value;
  const a = document.getElementById('song-artist').value;
  if(!t || !a) { alert("모두 입력해주세요"); return; }
  db.ref('songRequests').push({ author: loggedInUser, title: t, artist: a, timestamp: Date.now() }).then(() => {
    alert("신청되었습니다."); closeModal('song-modal');
  });
}

function changePw() {
  const p = document.getElementById('new-pw').value.trim();
  if(!p) return;
  db.ref('auth/students/' + loggedInUser).set(p).then(() => { alert("변경되었습니다."); closeModal('pw-modal'); });
}

function openGame(url, title) {
  document.getElementById('game-iframe-container').style.display = 'flex';
  document.getElementById('game-title-bar').innerText = title;
  document.getElementById('game-frame').src = url;
}
function closeGame() {
  document.getElementById('game-iframe-container').style.display = 'none';
  document.getElementById('game-frame').src = "";
}

/* =========================================================
   4. 나이스(NEIS) API 연동 (시간표/급식표)
========================================================= */
const NEIS_KEY = '7be1608e99d34736b6729aab42d32665';
const ATPT_CODE = 'B10';
const SCHUL_CODE = '7010536';

async function fetchNeisData() {
  const now = new Date();
  const getFormattedDate = (d) => d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
  const todayStr = getFormattedDate(now);

  // 이번주 월요일~금요일 날짜 구하기
  const day = now.getDay(); // 0(일) ~ 6(토)
  const diffToMon = now.getDate() - day + (day === 0 ? -6 : 1); 
  const monDate = new Date(now.setDate(diffToMon));
  const friDate = new Date(monDate); friDate.setDate(monDate.getDate() + 4);
  
  const fromStr = getFormattedDate(monDate);
  const toStr = getFormattedDate(friDate);

  // 1. 급식 데이터 (오늘 기준)
  try {
    const mealRes = await fetch(`https://open.neis.go.kr/hub/mealServiceDietInfo?KEY=${NEIS_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&MLSV_YMD=${todayStr}`);
    const mealData = await mealRes.json();
    if (mealData.mealServiceDietInfo) {
      mealData.mealServiceDietInfo[1].row.forEach(m => {
        const menuClean = m.DDISH_NM.replace(/<br\/>/g, ', ').replace(/[0-9.]/g, '').replace(/\*/g, '').trim();
        if(m.MMEAL_SC_NM === '중식') document.getElementById('lunch-menu').innerText = menuClean;
        if(m.MMEAL_SC_NM === '석식') document.getElementById('dinner-menu').innerText = menuClean;
      });
    } else {
      document.getElementById('lunch-menu').innerText = "오늘은 급식 정보가 없습니다.";
      document.getElementById('dinner-menu').innerText = "오늘은 급식 정보가 없습니다.";
    }
  } catch(e) { console.error("급식 로드 실패", e); }

  // 2. 시간표 데이터 (이번주 월~금)
  try {
    const timeRes = await fetch(`https://open.neis.go.kr/hub/hisTimetable?KEY=${NEIS_KEY}&Type=json&ATPT_OFCDC_SC_CODE=${ATPT_CODE}&SD_SCHUL_CODE=${SCHUL_CODE}&TI_FROM_YMD=${fromStr}&TI_TO_YMD=${toStr}&GRADE=1&CLASS_NM=4`);
    const timeData = await timeRes.json();
    
    // 테이블 초기화 7교시 기준 (배열[교시][요일])
    let schedule = Array.from({length: 7}, () => Array(5).fill('')); 
    
    if (timeData.hisTimetable) {
      timeData.hisTimetable[1].row.forEach(t => {
        const period = parseInt(t.PERIO) - 1; // 0 ~ 6
        const dateObj = new Date(t.ALL_TI_YMD.replace(/(\d{4})(\d{2})(\d{2})/, "$1-$2-$3"));
        const dayIdx = dateObj.getDay() - 1; // 0(월) ~ 4(금)
        
        if(period >= 0 && period < 7 && dayIdx >= 0 && dayIdx < 5) {
          schedule[period][dayIdx] = t.ITRT_CNTNT.replace('-',''); // 과목명
        }
      });
    }

    // 화면 테이블 그리기
    const tbody = document.getElementById('timetable-body');
    tbody.innerHTML = "";
    schedule.forEach((row, pIdx) => {
      let tr = document.createElement('tr');
      tr.innerHTML = `<td>${pIdx + 1}교시</td>`;
      row.forEach((subject, dIdx) => {
        const isToday = (day - 1 === dIdx);
        tr.innerHTML += `<td class="${isToday ? 'today' : ''}">${subject}</td>`;
      });
      tbody.appendChild(tr);
    });

    // 오늘 요일 하이라이트 처리
    if(day >= 1 && day <= 5) document.getElementById(`th-${day}`).classList.add('today');

    // 현재 남은 시간 간단 계산기능
    setInterval(() => {
      const tNow = new Date();
      // 임시로 현재 시간을 텍스트로 보여줌 (상세 시간표 로직은 학교 시간표 테이블에 맞춰 커스텀 가능)
      document.getElementById('class-countdown').innerText = `${tNow.getHours()}시 ${tNow.getMinutes()}분 진행중`;
    }, 1000);

  } catch(e) { console.error("시간표 로드 실패", e); }
}
</script>
